name: Daily price scrape

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scraper
        env:
          HOPHUB_LIVE_SCRAPE: '0'
        run: node scripts/scrape.mjs
      - name: Commit price feed
        run: |
          git config user.name "hophub-bot"
          git config user.email "hophub-bot@users.noreply.github.com"
          if git diff --quiet public/data; then
            echo "no changes"
            exit 0
          fi
          git add public/data
          git commit -m "chore(data): refresh prices feed [skip ci]"
          git push
